<!doctype html>
<html lang="en" class="h-full bg-slate-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat Context Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.12.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  </head>
  <body class="h-full text-slate-100">
    <div class="min-h-full bg-gradient-to-b from-slate-950 to-slate-900 p-6">
      <div class="mx-auto max-w-7xl">
        <h1 class="mb-2 text-3xl font-bold">AI Chat Context Extractor</h1>
        <p class="mb-6 text-slate-300">Drop files to extract text from .txt, .json, .docx, and images (OCR).</p>

        <div class="grid gap-6 lg:grid-cols-12">
          <section class="rounded-2xl border border-slate-700 bg-slate-900/70 p-5 lg:col-span-4">
            <h2 class="mb-3 text-lg font-semibold">Ingestion</h2>

            <div id="dropZone" class="rounded-xl border-2 border-dashed border-slate-600 bg-slate-900 p-6 text-center transition hover:border-sky-400">
              <p class="font-medium">Drop files here</p>
              <p class="mt-1 text-sm text-slate-400">or click to browse</p>
              <input id="fileInput" type="file" multiple class="hidden" accept=".txt,.json,.docx,image/*" />
            </div>

            <p id="status" class="mt-4 text-sm text-slate-300">Idle</p>

            <div class="mt-4 rounded-xl border border-slate-700 bg-slate-950/70 p-4">
              <h3 class="mb-2 text-sm font-semibold uppercase tracking-wide text-slate-300">Ingested files</h3>
              <ul id="ingestedFiles" class="space-y-2 text-sm text-slate-200"></ul>
            </div>
          </section>

          <section class="rounded-2xl border border-slate-700 bg-slate-900/70 p-5 lg:col-span-8">
            <div class="mb-3 flex flex-wrap items-center justify-between gap-3">
              <h2 class="text-lg font-semibold">Extracted Text</h2>
              <div class="flex gap-2">
                <button id="copyBtn" class="rounded-lg border border-slate-600 px-4 py-2 text-sm font-medium hover:border-slate-400 hover:bg-slate-800">Copy to Clipboard</button>
                <button id="exportBtn" class="rounded-lg bg-sky-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-sky-400">Package &amp; Export ZIP</button>
              </div>
            </div>
            <textarea id="output" class="h-[70vh] w-full rounded-xl border border-slate-700 bg-slate-950 p-4 font-mono text-sm leading-relaxed text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="Extracted text will appear here..."></textarea>
          </section>
        </div>
      </div>
    </div>

    <script>
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const output = document.getElementById('output');
      const statusText = document.getElementById('status');
      const ingestedFiles = document.getElementById('ingestedFiles');
      const exportBtn = document.getElementById('exportBtn');
      const copyBtn = document.getElementById('copyBtn');

      const imageTypeRegex = /^image\//i;

      function setStatus(message) {
        statusText.textContent = message;
      }

      function appendOutput(filename, text) {
        const safeText = (text || '').trim();
        if (!safeText) return;
        const separator = output.value.trim() ? '\n\n' : '';
        output.value += `${separator}===== ${filename} =====\n${safeText}`;
      }

      function addIngestedFile(filename) {
        const li = document.createElement('li');
        li.className = 'flex items-center gap-2';
        li.innerHTML = '<span class="text-emerald-400">✅</span>';

        const name = document.createElement('span');
        name.className = 'truncate';
        name.textContent = filename;

        li.appendChild(name);
        ingestedFiles.appendChild(li);
      }

      async function extractTextFromFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === 'txt' || ext === 'json') {
          return file.text();
        }

        if (ext === 'docx') {
          const arrayBuffer = await file.arrayBuffer();
          const result = await mammoth.extractRawText({ arrayBuffer });
          return result.value || '';
        }

        if (imageTypeRegex.test(file.type)) {
          const result = await Tesseract.recognize(file, 'eng', {
            logger: (m) => {
              if (m.status === 'recognizing text') {
                const percent = Math.round((m.progress || 0) * 100);
                setStatus(`Scanning image: ${percent}%`);
              }
            }
          });
          return result.data?.text || '';
        }

        throw new Error(`Unsupported file type: ${file.name}`);
      }

      async function handleFiles(fileList) {
        const files = Array.from(fileList || []);
        if (!files.length) return;

        for (const file of files) {
          try {
            setStatus(`Processing: ${file.name}`);
            const text = await extractTextFromFile(file);
            appendOutput(file.name, text);
            addIngestedFile(file.name);
            setStatus(`Done: ${file.name}`);
          } catch (error) {
            console.error(error);
            setStatus(`Error with ${file.name}: ${error.message}`);
          }
        }

        setStatus('All selected files processed.');
      }

      dropZone.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', (event) => {
        handleFiles(event.target.files);
        fileInput.value = '';
      });

      dropZone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropZone.classList.add('border-sky-400');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('border-sky-400');
      });

      dropZone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropZone.classList.remove('border-sky-400');
        handleFiles(event.dataTransfer.files);
      });

      copyBtn.addEventListener('click', async () => {
        const originalText = copyBtn.textContent;
        try {
          await navigator.clipboard.writeText(output.value);
          copyBtn.textContent = 'Copied!';
          copyBtn.disabled = true;
          setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.disabled = false;
          }, 1200);
        } catch (error) {
          setStatus('Clipboard copy failed.');
        }
      });

      exportBtn.addEventListener('click', async () => {
        try {
          const zip = new JSZip();
          zip.file('extracted-context.txt', output.value || '');
          const blob = await zip.generateAsync({ type: 'blob' });
          saveAs(blob, 'chat-context-export.zip');
          setStatus('ZIP exported successfully.');
        } catch (error) {
          console.error(error);
          setStatus('Failed to export ZIP.');
        }
      });
    </script>
  </body>
</html>
